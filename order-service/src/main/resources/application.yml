server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    # Notice the 5433 port we fixed earlier!
    url: jdbc:postgresql://localhost:5436/orders_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update # Auto-creates your database tables for this learning project
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: order-group
      auto-offset-reset: earliest